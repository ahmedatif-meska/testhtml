<style>
  :root{
    --ink:#1c1a17;
    --paper:#faf7f2;
    --panel:#ffffff;
    --line:#e4ddd1;
    --accent:#3f5d54;
    --accent-soft:#e7ede9;
    --user-bubble:#232323;
    --user-text:#f7f5f0;
    --muted:#8a8378;
  }
  html,body{background:var(--paper);margin:0;padding:0;height:100%;}
  *{box-sizing:border-box;}
  body{font-family:'Iowan Old Style','Georgia',serif;color:var(--ink);}

  #app{
    display:flex;flex-direction:column;
    height:100%;min-height:600px;max-width:720px;margin:0 auto;
  }
  header{padding:20px 24px 16px;border-bottom:1px solid var(--line);}
  .eyebrow{
    font-size:11px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;
  }
  h1{margin:4px 0 0;font-size:24px;font-weight:600;}

  #messages{
    flex:1;overflow-y:auto;padding:20px 24px;
    display:flex;flex-direction:column;gap:14px;
  }
  .empty-state{
    margin:auto;text-align:center;color:var(--muted);
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;
    max-width:320px;line-height:1.6;
  }
  .msg-wrap{max-width:80%;}
  .msg-wrap.user{align-self:flex-end;}
  .msg-wrap.assistant{align-self:flex-start;}
  .msg-label{
    font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--muted);margin-bottom:4px;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  .msg-wrap.user .msg-label{text-align:right;}
  .bubble{
    padding:12px 16px;font-size:15px;line-height:1.55;
    white-space:pre-wrap;
  }
  .msg-wrap.user .bubble{
    background:var(--user-bubble);color:var(--user-text);
    border-radius:16px 16px 4px 16px;
  }
  .msg-wrap.assistant .bubble{
    background:var(--panel);color:var(--ink);
    border:1px solid var(--line);
    border-radius:16px 16px 16px 4px;
  }
  .thinking .bubble{color:var(--muted);}
  .error-msg{
    align-self:center;color:#a4442e;font-size:13px;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }

  #input-row{
    border-top:1px solid var(--line);padding:16px 24px 22px;
    display:flex;gap:10px;align-items:flex-end;
  }
  textarea{
    flex:1;resize:none;border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;font-size:15px;
    font-family:inherit;background:var(--panel);color:var(--ink);
    outline:none;max-height:120px;
  }
  button{
    border:none;border-radius:12px;padding:11px 18px;
    font-size:14px;font-family:'Helvetica Neue',Arial,sans-serif;
    font-weight:600;cursor:pointer;
    background:var(--accent);color:#fff;
  }
  button:disabled{
    background:var(--accent-soft);color:var(--muted);cursor:default;
  }
</style>

<div id="app">
  <header>
    <div class="eyebrow">Ask anything</div>
    <h1>A quiet place to ask questions</h1>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      Type a question below — anything at all — and press Enter.
    </div>
  </div>

  <div id="input-row">
    <textarea id="input" placeholder="Ask a question…" rows="1"></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  let history = [];
  let loading = false;

  function renderMessage(role, content){
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + role;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Claude';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    return wrap;
  }

  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(isLoading){
    loading = isLoading;
    sendBtn.disabled = loading || !inputEl.value.trim();
    inputEl.disabled = loading;
  }

  async function send(){
    const text = inputEl.value.trim();
    if(!text || loading) return;

    if(emptyState) emptyState.remove();

    history.push({role:'user', content:text});
    renderMessage('user', text);
    inputEl.value = '';
    autoResize();
    scrollToBottom();
    setLoading(true);

    const thinkingWrap = document.createElement('div');
    thinkingWrap.className = 'msg-wrap assistant thinking';
    thinkingWrap.innerHTML = '<div class="msg-label">Claude</div><div class="bubble">thinking…</div>';
    messagesEl.appendChild(thinkingWrap);
    scrollToBottom();

    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: history
        })
      });

      if(!response.ok){
        throw new Error('Request failed with status ' + response.status);
      }

      const data = await response.json();
      const textBlocks = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text);
      const reply = textBlocks.join('\\n').trim() || '(no response)';

      thinkingWrap.remove();
      history.push({role:'assistant', content:reply});
      renderMessage('assistant', reply);
      scrollToBottom();
    } catch(err){
      thinkingWrap.remove();
      const errEl = document.createElement('div');
      errEl.className = 'error-msg';
      errEl.textContent = 'Something went wrong: ' + err.message;
      messagesEl.appendChild(errEl);
      scrollToBottom();
    } finally {
      setLoading(false);
    }
  }

  function autoResize(){
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = loading || !inputEl.value.trim();
    autoResize();
  });

  inputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
</script>
